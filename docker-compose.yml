version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongo:27017/search_engine}
      - MONGODB_DB_NAME=search_engine
      - DEBUG=false
    depends_on:
      - mongo
    volumes:
      - ./indexes:/app/indexes
    restart: unless-stopped
    networks:
      - search-engine-net

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=search_engine
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    networks:
      - search-engine-net

volumes:
  mongo_data:

networks:
  search-engine-net:
    driver: bridge
